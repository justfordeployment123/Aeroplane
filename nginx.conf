server {
    listen 80;
    server_name flyingpan.com www.flyingpan.com;

    # Redirect www → non-www (canonical)
    if ($host = www.flyingpan.com) {
        return 301 https://flyingpan.com$request_uri;
    }

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name flyingpan.com;

    # SSL certificates (e.g. Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/flyingpan.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/flyingpan.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;          # tells CDNs/proxies the response varies by Accept-Encoding
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css
        application/json application/javascript
        text/xml application/xml application/xml+rss
        text/javascript image/svg+xml
        application/font-woff application/font-woff2;
    gzip_min_length 1024;

    # ── Static assets — long cache ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── robots.txt & sitemap — no cache so crawlers always get fresh ──
    location = /robots.txt {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "no-cache";
        add_header Content-Type "application/xml";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        # index.html must NOT be cached — browsers must always re-fetch
        # so they pick up new JS/CSS filenames after a deploy
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"            always;
    add_header X-Content-Type-Options   "nosniff"               always;
    add_header X-XSS-Protection         "1; mode=block"         always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Hide server fingerprint ───────────────────────────────
    server_tokens off;
}